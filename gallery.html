<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ SparkleShare - Gallery ✨</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sparkle-overlay"></div>
    
    <div class="container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <h2>✨ SparkleShare ✨</h2>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 Home</a>
                <a href="gallery.html" class="nav-link active">📷 Gallery</a>
                <a href="videos.html" class="nav-link">🎬 Videos</a>
            </div>
        </nav>

        <!-- Gallery Header -->
        <div class="page-header">
            <h1>📷 Photo Gallery 📷</h1>
            <p>All your beautiful photos in one magical place ✨</p>
        </div>

        <!-- Album Selector -->
        <div class="album-selector">
            <label>Choose Album:</label>
            <select id="galleryAlbumSelect" class="album-select">
                <option value="">All Albums</option>
            </select>
            <button id="createAlbumBtnGallery" class="btn-small">➕ New Album</button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Photos will be loaded here -->
        </div>

        <!-- Lightbox Modal for viewing photos -->
        <div id="lightboxModal" class="modal hidden">
            <div class="modal-content lightbox-content">
                <span class="close">&times;</span>
                <div id="lightboxImage" class="lightbox-image"></div>
                <div class="lightbox-info" id="lightboxInfo"></div>
                
                <!-- Photo Comments Section -->
                <div class="comments-section">
                    <h4>💬 Comments 💬</h4>
                    <div id="lightboxComments" class="comments-list"></div>
                    <div class="add-comment">
                        <textarea id="lightboxCommentInput" placeholder="Add a comment... 💖" maxlength="500"></textarea>
                        <div class="comment-controls">
                            <input type="color" id="lightboxCommentColor" value="#ff69b4">
                            <label>Choose your color ✨</label>
                            <button id="addLightboxCommentBtn" class="btn-primary">Post Comment 💬</button>
                        </div>
                    </div>
                </div>
                
                <div class="modal-buttons">
                    <button id="deletePhotoBtn" class="btn-danger">🗑️ Delete Photo</button>
                    <button id="downloadPhotoBtn" class="btn-secondary">💾 Download</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
