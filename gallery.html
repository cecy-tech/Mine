<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleShare - Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">SparkleShare</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="gallery.html" class="active">Gallery</a>
                <a href="videos.html">Videos</a>
            </div>
        </nav>

        <!-- Page Header -->
        <div class="page-header">
            <h1>📷 Photo Gallery</h1>
            <p>All your beautiful photos in one magical place</p>
        </div>

        <!-- Album Filter -->
        <div class="filter-bar">
            <select id="albumFilter" class="filter-select">
                <option value="all">All Albums</option>
            </select>
            <button id="uploadPhotoBtn" class="btn-secondary">
                <i class="fas fa-plus"></i> Upload Photos
            </button>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Photos will appear here -->
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Upload Photos & Videos</h3>
            <select id="uploadAlbumSelect" class="album-select">
                <option value="">Select Album</option>
            </select>
            <input type="file" id="uploadFiles" multiple accept="image/*,video/*">
            <button id="confirmUploadBtn" class="btn-primary">Upload</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
