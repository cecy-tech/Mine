<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ SparkleShare - Gallery ✨</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sparkle-overlay"></div>
    <div class="floating-hearts"></div>
    <div class="floating-stars"></div>
    
    <div class="container">
        <!-- Horizontal Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-star sparkle-icon"></i>
                <h2>SparkleShare</h2>
                <i class="fas fa-star sparkle-icon"></i>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="gallery.html" class="nav-link active">
                    <i class="fas fa-images"></i> Gallery
                </a>
                <a href="videos.html" class="nav-link">
                    <i class="fas fa-video"></i> Videos
                </a>
            </div>
        </nav>

        <!-- Page Header -->
        <div class="page-header">
            <div class="header-decoration">
                <i class="fas fa-camera-retro"></i>
            </div>
            <h1>📷 Photo Gallery 📷</h1>
            <p>All your beautiful photos in one magical place ✨</p>
        </div>

        <!-- Album Filter -->
        <div class="filter-section">
            <div class="filter-card">
                <label><i class="fas fa-filter"></i> Filter by Album:</label>
                <select id="galleryAlbumFilter" class="album-select">
                    <option value="all">✨ All Albums ✨</option>
                </select>
                <button id="createAlbumBtnGallery" class="btn-small">
                    <i class="fas fa-plus"></i> New Album
                </button>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Photos will be loaded here -->
        </div>
    </div>

    <!-- Lightbox Modal for viewing photos -->
    <div id="lightboxModal" class="modal hidden">
        <div class="modal-content lightbox-content">
            <span class="close">&times;</span>
            <div id="lightboxImage" class="lightbox-image"></div>
            <div class="lightbox-info" id="lightboxInfo"></div>
            
            <!-- Photo Comments Section -->
            <div class="comments-section">
                <h4><i class="fas fa-comments"></i> Comments</h4>
                <div id="lightboxComments" class="comments-list"></div>
                <div class="add-comment">
                    <textarea id="lightboxCommentInput" placeholder="Add a comment... 💖" maxlength="500"></textarea>
                    <div class="comment-controls">
                        <input type="color" id="lightboxCommentColor" value="#ff69b4">
                        <label><i class="fas fa-palette"></i> Choose your color</label>
                        <button id="addLightboxCommentBtn" class="btn-primary">
                            <i class="fas fa-paper-plane"></i> Post Comment
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button id="deletePhotoBtn" class="btn-danger">
                    <i class="fas fa-trash-alt"></i> Delete Photo
                </button>
                <button id="downloadPhotoBtn" class="btn-secondary">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
