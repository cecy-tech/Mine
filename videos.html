<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleShare - Videos</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">SparkleShare</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
                <a href="videos.html" class="active">Videos</a>
            </div>
        </nav>

        <!-- Page Header -->
        <div class="page-header">
            <h1>🎬 Video Gallery</h1>
            <p>Watch and share your magical video memories</p>
        </div>

        <!-- Album Filter -->
        <div class="filter-bar">
            <select id="videoAlbumFilter" class="filter-select">
                <option value="all">All Albums</option>
            </select>
            <button id="uploadVideoBtn" class="btn-secondary">
                <i class="fas fa-plus"></i> Upload Videos
            </button>
        </div>

        <!-- Videos Grid -->
        <div class="videos-grid" id="videosGrid">
            <!-- Videos will appear here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
