<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strawberry Dreams ✨</title>
<style>
body {
  background: #ffe4ec;
  overflow-x: hidden;
  font-family: 'Comic Neue', cursive, sans-serif;
}

.upload-container {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 100;
}

.upload-container input[type="file"] {
  padding: 10px;
  border-radius: 10px;
  border: 2px dashed #ffb6c1;
  background: #fff0f5;
  cursor: pointer;
}

.upload-container nav a {
  text-decoration: none;
  padding: 10px 20px;
  background: #a64ca6;
  color: #fff;
  border-radius: 50px;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 0 10px #ffb6c1, 0 0 15px #ff69b4;
  transition: transform 0.2s;
}
.upload-container nav a:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #fff, 0 0 20px #ffb6c1;
}

.page-heading {
  color: #89CFF0;
  font-size: 2rem;
  margin-top: 100px;
  text-shadow: 1px 1px 2px #fff;
  text-align: center;
}

.gallery {
  margin-top: 150px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 20px;
  position: relative;
}

.draggable {
  cursor: move;
  max-width: 300px;
  max-height: 200px;
  border: 2px dashed #ffb6c1;
  border-radius: 15px;
}

.doodle {
  position: absolute;
  width: 80px;
  height: 80px;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(15deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

.sparkle, .heart, .star, .trail {
  position: absolute;
  pointer-events: none;
}

.heart {
  width: 10px;
  height: 10px;
  background: pink;
  clip-path: polygon(50% 0%, 61% 16%, 75% 18%, 85% 33%, 50% 100%, 15% 33%, 25% 18%, 39% 16%);
  animation: bounce 2s infinite;
}

.star {
  width: 6px;
  height: 6px;
  background: yellow;
  box-shadow: 0 0 5px #fff;
  animation: twinkle 1.5s infinite alternate;
}

.trail {
  width: 6px;
  height: 6px;
  background: #ffb6c1;
  border-radius: 50%;
  opacity: 0.8;
  box-shadow: 0 0 5px #ff69b4;
  animation: fade 0.6s forwards;
}

@keyframes bounce {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@keyframes twinkle {
  0% { opacity: 0.3; }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0.3; transform: scale(1); }
}

@keyframes fade {
  to { opacity: 0; transform: scale(0.5); }
}
</style>
</head>
<body>

<div class="upload-container">
  <input type="file" id="videoInput" accept="video/*" multiple>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="videos.html">Videos</a>
  </nav>
</div>

<h1 class="page-heading">Strawberry Dreams ✨</h1>

<div class="gallery" id="videoGallery"></div>

<mg src="images/bunny1.jpg" class="doodle" style="top:50px; left:30px;">
<img src="images/bunny2.jpg" class="doodle" style="top:120px; right:50px;">
<img src="images/flower1.jpg" class="doodle" style="top:200px; left:150px;">
<img src="images/flower2.jpg" class="doodle" style="top:300px; right:100px;">
<script>
// Video upload preview
document.getElementById('videoInput').addEventListener('change', function(){
  const files = this.files;
  const gallery = document.getElementById('videoGallery');
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e){
      const video = document.createElement('video');
      video.src = e.target.result;
      video.controls = true;
      video.classList.add('draggable');
      gallery.appendChild(video);

      // Hearts & stars around video
      for(let i=0;i<3;i++){
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.style.left = (Math.random()*200 + video.offsetLeft) + 'px';
        heart.style.top = (Math.random()*200 + video.offsetTop) + 'px';
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),3000);

        const star = document.createElement('div');
        star.classList.add('star');
        star.style.left = (Math.random()*200 + video.offsetLeft) + 'px';
        star.style.top = (Math.random()*200 + video.offsetTop) + 'px';
        document.body.appendChild(star);
        setTimeout(()=>star.remove(),3000);
      }

      makeDraggable(video);
    }
    reader.readAsDataURL(file);
  });
});

// Mouse-following sparkles
document.addEventListener('mousemove', function(e){
  const sparkle = document.createElement('div');
  sparkle.classList.add('sparkle');
  sparkle.style.width='5px';
  sparkle.style.height='5px';
  sparkle.style.left = e.pageX + 'px';
  sparkle.style.top = e.pageY + 'px';
  sparkle.style.background='#fff';
  sparkle.style.boxShadow='0 0 5px #ff69b4, 0 0 10px #ffb6c1';
  document.body.appendChild(sparkle);
  setTimeout(()=>sparkle.remove(),800);
});

// Animate doodles
const doodles = document.querySelectorAll('.doodle');
doodles.forEach(d => {
  const delay = Math.random() * 2;
  d.style.animation = `float 6s ease-in-out ${delay}s infinite alternate`;
});

// Draggable function with glitter trail
function makeDraggable(el){
  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener('mousedown', (e)=>{
    isDragging = true;
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
    el.style.position = 'absolute';
    el.style.zIndex = 200;
  });

  document.addEventListener('mousemove', (e)=>{
    if(isDragging){
      el.style.left = (e.clientX - offsetX) + 'px';
      el.style.top = (e.clientY - offsetY) + 'px';

      // Create glitter trail
      const trail = document.createElement('div');
      trail.classList.add('trail');
      trail.style.left = (e.clientX - 3) + 'px';
      trail.style.top = (e.clientY - 3) + 'px';
      document.body.appendChild(trail);
      setTimeout(()=>trail.remove(),600);
    }
  });

  document.addEventListener('mouseup', ()=>{
    isDragging = false;
  });
}
</script>
</body>
</html>
