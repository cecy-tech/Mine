<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ SparkleShare - Videos ✨</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sparkle-overlay"></div>
    
    <div class="container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <h2>✨ SparkleShare ✨</h2>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 Home</a>
                <a href="gallery.html" class="nav-link">📷 Gallery</a>
                <a href="videos.html" class="nav-link active">🎬 Videos</a>
            </div>
        </nav>

        <!-- Videos Header -->
        <div class="page-header">
            <h1>🎬 Video Gallery 🎬</h1>
            <p>Watch and share your magical video memories ✨</p>
        </div>

        <!-- Album Selector -->
        <div class="album-selector">
            <label>Choose Album:</label>
            <select id="videosAlbumSelect" class="album-select">
                <option value="">All Albums</option>
            </select>
            <button id="createAlbumBtnVideos" class="btn-small">➕ New Album</button>
        </div>

        <!-- Videos Grid -->
        <div class="videos-grid" id="videosGrid">
            <!-- Videos will be loaded here -->
        </div>

        <!-- Video Player Modal -->
        <div id="videoModal" class="modal hidden">
            <div class="modal-content video-modal-content">
                <span class="close">&times;</span>
                <div id="videoPlayer" class="video-player"></div>
                <div class="video-info" id="videoInfo"></div>
                
                <!-- Video Comments Section -->
                <div class="comments-section">
                    <h4>💬 Comments 💬</h4>
                    <div id="videoComments" class="comments-list"></div>
                    <div class="add-comment">
                        <textarea id="videoCommentInput" placeholder="Add a comment... 💖" maxlength="500"></textarea>
                        <div class="comment-controls">
                            <input type="color" id="videoCommentColor" value="#ff69b4">
                            <label>Choose your color ✨</label>
                            <button id="addVideoCommentBtn" class="btn-primary">Post Comment 💬</button>
                        </div>
                    </div>
                </div>
                
                <div class="modal-buttons">
                    <button id="deleteVideoBtn" class="btn-danger">🗑️ Delete Video</button>
                    <button id="downloadVideoBtn" class="btn-secondary">💾 Download</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
