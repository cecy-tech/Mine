<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Love</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="abstract-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="container">
        <nav>
            <div class="logo">PINK WORLD</div>
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="gallery.html">GALLERY</a>
                <a href="videos.html" class="active">VIDEOS</a>
                <a href="#">ABOUT</a>
            </div>
        </nav>

        <div class="page-header">
            <h1>Video Portfolio</h1>
            <p>Watch our video collection</p>
        </div>

        <div class="upload-area">
            <button id="uploadVideoBtn" class="btn-outline">
                <i class="fas fa-plus"></i> Upload New Videos
            </button>
        </div>

        <div class="videos-grid" id="videosGrid">
            <!-- Videos will appear here -->
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Upload Videos</h3>
            <input type="file" id="videoInput" multiple accept="video/*">
            <button id="confirmUpload" class="btn-primary">Upload</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
